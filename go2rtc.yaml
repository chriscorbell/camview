# go2rtc base configuration for camview.
# Docs: https://github.com/AlexxIT/go2rtc#configuration
#
# This file holds only the static settings (listen addresses, log level). The
# "camera" stream itself is generated at runtime by entrypoint.sh from these
# environment variables and merged in, so the GHCR image needs NO go2rtc.yaml on
# the host — just compose + .env:
#
#   CAMERA_RTSP_URL   (required)  e.g. rtsp://user:pass@192.168.1.50:554/stream1
#   TRANSCODE         h264 (default) | off    "off" = pass the feed through as-is
#   HWACCEL           (optional)  vaapi | cuda | qsv | ...  GPU for the transcode
#   WEBRTC_CANDIDATE  (optional)  "<lan-ip>:8555" to enable true WebRTC
#
# By default the stream exposes the raw camera feed PLUS an on-demand ffmpeg
# transcode to H.264/AAC/Opus, so every browser can play it (Safari can still
# use native HEVC). The transcode only runs while someone is watching.

api:
  # Internal API + signaling WebSocket. nginx reverse-proxies to this.
  # Bound to localhost only; nginx is the public entry point.
  listen: "127.0.0.1:1984"

rtsp:
  # Internal RTSP server (used by go2rtc for restreaming). Not exposed.
  listen: "127.0.0.1:8554"

webrtc:
  # WebRTC media transport. Reachable via the mapped 8555 port in bridge mode.
  listen: ":8555"
  # NOTE: candidates are injected at runtime by entrypoint.sh *only* when the
  # WEBRTC_CANDIDATE env var is set (e.g. "192.168.1.10:8555"). When it isn't,
  # go2rtc can't advertise a browser-reachable address in bridge mode, so the
  # player automatically falls back to MSE over the :8080 WebSocket. See README.

log:
  level: info
