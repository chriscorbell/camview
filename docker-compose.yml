services:
  camview:
    # Pre-built multi-arch image from GitHub Container Registry.
    # Pin a version instead of :latest if you prefer, e.g. :v1.0.0
    image: ghcr.io/chriscorbell/camview:latest
    # To build locally from source instead, comment out `image:` above and
    # uncomment: build: .
    container_name: camview
    restart: unless-stopped

    # Bridge networking (Docker default) with explicit port mappings.
    ports:
      - "8080:8080"        # web UI + signaling WebSocket
      - "8555:8555/tcp"    # WebRTC media (only used if WEBRTC_CANDIDATE is set)
      - "8555:8555/udp"    # WebRTC media (only used if WEBRTC_CANDIDATE is set)

    environment:
      # REQUIRED — your camera's RTSP URL.
      CAMERA_RTSP_URL: ${CAMERA_RTSP_URL}

      # OPTIONAL — set to your server's LAN IP + WebRTC port to enable true
      # WebRTC (lowest latency). If omitted, camview still works on :8080 using
      # MSE (~1s latency). Example: "192.168.1.10:8555"
      WEBRTC_CANDIDATE: ${WEBRTC_CANDIDATE:-}

      # OPTIONAL — "h264" (default) transcodes so any browser can play the feed;
      # "off" passes the camera through unchanged (use with an H.264 sub-stream).
      TRANSCODE: ${TRANSCODE:-h264}

      # OPTIONAL — offload the H.264 transcode to a GPU. Leave empty for software.
      # Values: vaapi (Intel/AMD), cuda (NVIDIA), qsv, etc. Requires the matching
      # GPU passthrough below (and, for NVIDIA, the two NVIDIA_* vars).
      HWACCEL: ${HWACCEL:-}

    # --- Hardware transcoding passthrough (optional) ---------------------------
    # Set HWACCEL above AND uncomment the block for your GPU below. No edits to
    # any file inside the image are needed.
    #
    # Intel / AMD (VAAPI / QuickSync) — set HWACCEL=vaapi
    #   Works with the ffmpeg bundled in the image. The container needs access to
    #   the render node; `render`/`video` must match the GID that owns
    #   /dev/dri/renderD128 on your host (run: `ls -n /dev/dri`).
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - "video"
    #   - "render"
    #
    # NVIDIA (NVENC / CUDA) — set HWACCEL=cuda
    #   Requires the NVIDIA Container Toolkit installed on the host. Add these
    #   two vars to the `environment:` block ABOVE (don't add a second one):
    #     NVIDIA_VISIBLE_DEVICES: all
    #     NVIDIA_DRIVER_CAPABILITIES: all
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, video]
    # ---------------------------------------------------------------------------

    # The UI is at http://<your-server-ip>:8080
